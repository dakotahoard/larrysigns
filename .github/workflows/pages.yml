# Deploy larrysigns.org: docs/ (site) + tools/ (HTML tools) → GitHub Pages
# Requires repo Settings → Pages → Build and deployment → Source: "GitHub Actions".
name: Deploy site
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (docs/ at root, tools/ alongside)
        run: |
          mkdir -p _site/tools
          cp -r docs/. _site/
          cp tools/*.html _site/tools/
          # ship avatar models too, so the signer can load them same-origin
          cp tools/*.vrm _site/tools/ 2>/dev/null || true
          cp tools/*.glb _site/tools/ 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
