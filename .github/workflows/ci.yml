name: ci
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Parser self-test (spec + adversarial corpus)
        run: python tools/larry_parser_prototype.py
      - name: Linter self-test
        run: python tools/larry_lint.py
      - name: Lint every example
        run: |
          status=0
          for f in examples/*.lry; do
            echo "== $f"
            python tools/larry_lint.py "$f" || status=1
          done
          exit $status
      - name: Lint every dictionary
        run: |
          status=0
          for f in dictionary/*.lry; do
            echo "== $f"
            python tools/larry_lint.py "$f" || status=1
          done
          exit $status
      - name: Spec 'latest' mirror is in sync
        run: |
          newest="$(ls spec/larry-spec-v*.md | sort -V | tail -1)"
          echo "newest versioned spec: $newest"
          cmp spec/larry-spec-latest.md "$newest"
